name: Daily Response Time Update

on:
  schedule:
    - cron: "0 12 * * 1-5"  # 8 AM EDT (UTC-4), Mon–Fri; shift to 13:00 in winter (EST)
  workflow_dispatch:
    inputs:
      target_date:
        description: "Date to process (YYYY-MM-DD). Leave blank for last business day."
        required: false
        default: ""

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > /tmp/google-creds.json

      - name: Run daily update
        env:
          GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
          GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/google-creds.json
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            python daily_update.py --date "${{ github.event.inputs.target_date }}"
          else
            python daily_update.py
          fi
